name: Kodi Trailer Factory

on:
  schedule:
    - cron: '0 2 * * *' # Wakes up at 2:00 AM UTC daily
  workflow_dispatch: # Adds the manual "Play" button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install yt-dlp

      - name: Run Sniper
        run: python global_sniper.py

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Robot: Added fresh trailers" || exit 0
          git push

name: Kodi Trailer Factory

on:
  schedule:
    - cron: '0 2 * * *' # Wakes up at 2:00 AM UTC daily
  workflow_dispatch: # Adds the manual "Play" button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install yt-dlp

      - name: Run Sniper
        run: python global_sniper.py

      - name: Generate Directory Index
        run: |
          echo "<html><body><h1>Trailer Index</h1><ul>" > index.html
          for f in PreShow_Trailers/*.strm; do
            echo "<li><a href=\"$f\">$(basename "$f")</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Robot: Updated trailer index for Kodi" || exit 0
          git push
